version: '3.8'

services:
  db:
    image: postgres:15
    container_name: quinx_saas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quinx
    ports:
      - "5432:5432"
    volumes:
      - quinx_postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: quinx_saas_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  quinx_postgres_data:
